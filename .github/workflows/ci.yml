name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=lsystem_renderer --cov-report=term-missing

    - name: Lint check
      run: |
        python -m py_compile lsystem_renderer/__init__.py
        python -m py_compile lsystem_renderer/core/types.py
        python -m py_compile lsystem_renderer/core/engine.py
        python -m py_compile lsystem_renderer/core/interpreter.py

  test-no-optional:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install core only
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest

    - name: Run core tests
      run: |
        pytest tests/ -v -k "not PNGRenderer" --tb=short