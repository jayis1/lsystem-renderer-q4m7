name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e ".[all]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check lsystem_renderer/ tests/ --ignore=E501,E731

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  test-minimal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests (no optional deps)
        run: |
          python -m pytest tests/ -v --tb=short -k "not PNG and not PDF and not Grid"

  test-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run full test suite with coverage
        run: |
          python -m pytest tests/ -v --cov=lsystem_renderer --cov-report=term-missing --tb=short